name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from the GitHub Actions UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; any in-progress run is cancelled on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4
        with:
          enablement: true  # enable Pages via Actions if not already active

      # Deploy the committed dist/ folder directly — no build step needed
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
